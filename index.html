<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Battle Captain</title>
  <meta name="description" content="The future home of the Battle Captain Continuity Book — wargame rules, reimagined for the table.">

  <!-- Favicon from same image -->
  <link rel="icon" type="image/png" sizes="256x256" href="assets/hero.png">
  <link rel="apple-touch-icon" href="assets/hero.png">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --od-green:    #3b3e2c;
      --od-mid:      #4d5138;
      --od-light:    #6b7057;
      --tan:         #c4ae82;
      --tan-dim:     #8a7a5a;
      --text:        #ede8dc;
      --text-muted:  #9e9480;
      --gold:        #c8a84a;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--od-green);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1.5rem;
      text-align: center;
    }

    /* subtle texture overlay */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='4' height='4' viewBox='0 0 4 4' xmlns='http://www.w3.org/2000/svg'%3E%3Crect x='0' y='0' width='1' height='1' fill='%23ffffff' fill-opacity='0.015'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 480px;
      width: 100%;
    }

    /* ── Hero image ─────────────────────────────────────────── */
    .hero-image {
      width: 200px;
      height: 200px;
      margin: 0 auto 2.5rem;
      border-radius: 4px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.06),
        0 8px 32px rgba(0,0,0,0.5);
    }

    .hero-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── Eyebrow label ──────────────────────────────────────── */
    .eyebrow {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.75rem;
    }

    /* ── Main heading ───────────────────────────────────────── */
    h1 {
      font-size: clamp(1.8rem, 6vw, 2.6rem);
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text);
      line-height: 1.1;
      margin-bottom: 0.4rem;
    }

    h1 span {
      display: block;
      font-size: 0.52em;
      font-weight: 500;
      letter-spacing: 0.18em;
      color: var(--tan);
      margin-top: 0.3rem;
    }

    /* ── Rule ───────────────────────────────────────────────── */
    .rule {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.75rem auto;
      max-width: 260px;
    }

    .rule::before,
    .rule::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--od-light);
    }

    .rule-icon {
      width: 8px;
      height: 8px;
      background: var(--gold);
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    /* ── Body copy ──────────────────────────────────────────── */
    .body-copy {
      font-size: 1rem;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    .body-copy strong {
      color: var(--text);
      font-weight: 600;
    }

    /* ── CTA link ───────────────────────────────────────────── */
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 1.5rem;
      border: 1px solid var(--tan-dim);
      color: var(--tan);
      text-decoration: none;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border-radius: 2px;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .cta:hover {
      background: var(--tan-dim);
      border-color: var(--tan-dim);
      color: var(--od-green);
    }

    .cta svg {
      width: 12px;
      height: 12px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── Footer ─────────────────────────────────────────────── */
    footer {
      position: relative;
      z-index: 1;
      margin-top: 3.5rem;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--od-light);
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="hero-image">
      <img src="assets/hero.png" alt="Battle Captain Continuity Book">
    </div>

    <p class="eyebrow">Coming Soon</p>

    <h1>
      Battle Captain
      <span>Continuity Book</span>
    </h1>

    <div class="rule"><div class="rule-icon"></div></div>

    <p class="body-copy">
      This is the future home of the<br>
      <strong>Battle Captain Continuity Book</strong> —<br>
      a new way to consume wargame rules,<br>
      built for speed of play and ease of learning.
    </p>

    <a href="https://rules.battle-captain.com" class="cta">
      Rules Reference
      <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </a>

  </div>

  <footer>&copy; 2026 Battle Captain</footer>

</body>
</html>
